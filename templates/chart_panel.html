<article>
    <canvas id="myChart"></canvas>
</article>

<script>
(function() {
    const ctx = document.getElementById('myChart');

    const windowSeconds = 60;
    const pressureData = [];

    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            datasets: [{
                label: 'Pressure',
                data: pressureData,
                borderWidth: 2,
                pointRadius: 0,
                tension: 0.2
            }]
        },
        options: {
            animation: false,
            parsing: false,
            scales: {
                x: {
                    type: 'linear',
                    title: {
                        display: true,
                        text: 'Seconds'
                    }
                },
                y: {
                    beginAtZero: true
                }
            }
        }
    });

    const source = new EventSource('/api/events');

    source.addEventListener('message', event => {
        const data = JSON.parse(event.data);

        pressureData.push({
            x: data.millis / 1000,
            y: data.pressure
        });
    });

    setInterval(() => {
        if (!pressureData.length) return;

        const latestTime = pressureData.at(-1).x;
        const cutoff = latestTime - windowSeconds;

        while (pressureData.length &&
               pressureData[0].x < cutoff) {
            pressureData.shift();
        }

        chart.options.scales.x.min = cutoff;
        chart.options.scales.x.max = latestTime;

        chart.update('none');

    }, 200);
})();
</script>
